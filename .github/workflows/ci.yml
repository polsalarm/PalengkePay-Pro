name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  contracts:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/*.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract tests
        working-directory: contracts
        run: cargo test --workspace

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_STELLAR_NETWORK: testnet
          VITE_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          VITE_VENDOR_REGISTRY_CONTRACT_ID: PLACEHOLDER
          VITE_PALENGKE_PAYMENT_CONTRACT_ID: PLACEHOLDER
          VITE_UTANG_ESCROW_CONTRACT_ID: PLACEHOLDER
